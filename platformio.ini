; PlatformIO Project Configuration File
;
; Flash Bee — handheld AS3935 lightning detector on Seeed XIAO ESP32-C3
; driving the Seeed Studio Round Display (1.28" GC9A01, 240x240).
;
; Library / display-setup notes:
;   - We use the Seeed_GFX fork of TFT_eSPI (NOT bodmer/TFT_eSPI).
;     Both libraries claim TFT_eSPI.h; listing the Seeed fork by URL
;     and `lib_ignore = TFT_eSPI` prevents an LDF tie-break collision
;     if the RoundDisplay library's depends= line pulls it in.
;   - Seeed_GFX's Dynamic_Setup.h dispatches on BOARD_SCREEN_COMBO.
;     501 -> Setup501_Seeed_XIAO_Round_Display.h (GC9A01 on XIAO SPI).
;     The canonical Seeed examples put `driver.h` in the sketch dir,
;     but PlatformIO does NOT add `-Iinclude` to library compilation
;     units — so `#if __has_include("driver.h")` inside Seeed_GFX's
;     own source files silently fails and the library falls through
;     to combo 666 (a CI stub, wrong pinout for the round display).
;     Defining BOARD_SCREEN_COMBO as a -D flag makes it visible to
;     every compilation unit uniformly and avoids that trap.

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200

lib_ldf_mode = deep+
lib_ignore = TFT_eSPI
lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX.git
    https://github.com/Seeed-Studio/Seeed_Arduino_RoundDisplay.git

build_flags =
    -DBOARD_SCREEN_COMBO=501
    -DCORE_DEBUG_LEVEL=3
